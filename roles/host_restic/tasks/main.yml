---
- name: Fail on removed legacy restic variables
  ansible.builtin.assert:
    that:
      - lookup('ansible.builtin.vars', legacy_var, default=None) is none
    fail_msg: >-
      host_restic no longer accepts the legacy variable {{ legacy_var }}.
      Pass a single host_restic mapping with targets, datasets, and jobs instead.
  loop:
    - restic_enabled
    - restic_install_package
    - restic_package_name
    - restic_apt_cache_valid_time
    - restic_backup_root
    - restic_targets_dir
    - restic_jobs_dir
    - restic_passwords_dir
    - restic_backup_script_path
    - restic_maintain_script_path
    - restic_ssh_dir
    - restic_targets
    - restic_backup_jobs
    - restic_backup_contributions
  loop_control:
    loop_var: legacy_var

- name: Configure restic host backups
  when: host_restic.enabled | bool
  block:
    - name: Compose effective backup configuration
      ansible.builtin.import_tasks: compose.yml

    - name: Validate effective backup configuration
      ansible.builtin.import_tasks: validate.yml

    - name: Install restic package
      ansible.builtin.apt:
        name: "{{ host_restic.package_name }}"
        state: present
        update_cache: true
        cache_valid_time: "{{ host_restic.apt_cache_valid_time }}"
      when: host_restic.install_package | bool

    - name: Ensure backup working directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0700'
      loop:
        - "{{ host_restic.backup_root }}"
        - "{{ host_restic.targets_dir }}"
        - "{{ host_restic.jobs_dir }}"
        - "{{ host_restic.passwords_dir }}"

    - name: Ensure restic SSH directory exists when key material is configured
      ansible.builtin.file:
        path: "{{ host_restic.ssh_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0700'
      when: (restic_effective_targets | selectattr('ssh_private_key', 'truthy') | list | length) > 0

    - name: Render restic target SSH private keys
      ansible.builtin.copy:
        dest: "{{ host_restic.ssh_dir }}/{{ item.name }}.key"
        content: "{{ item.ssh_private_key }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true
      loop: "{{ restic_effective_targets }}"
      loop_control:
        label: "{{ item.name }}"
      when: (item.ssh_private_key | length) > 0

    - name: Render restic target known_hosts files
      ansible.builtin.copy:
        dest: "{{ host_restic.ssh_dir }}/{{ item.name }}_known_hosts"
        content: "{{ item.ssh_known_hosts }}"
        owner: root
        group: root
        mode: '0600'
      no_log: true
      loop: "{{ restic_effective_targets }}"
      loop_control:
        label: "{{ item.name }}"
      when: (item.ssh_known_hosts | length) > 0

    - name: Render restic password files
      ansible.builtin.copy:
        dest: "{{ host_restic.passwords_dir }}/{{ item.name }}.password"
        content: "{{ item.password }}\n"
        owner: root
        group: root
        mode: '0600'
      no_log: true
      loop: "{{ restic_effective_targets }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Render restic target env files
      ansible.builtin.template:
        src: restic-target.env.j2
        dest: "{{ host_restic.targets_dir }}/{{ item.name }}.env"
        owner: root
        group: root
        mode: '0600'
      no_log: true
      loop: "{{ restic_effective_targets }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        restic_target: "{{ item }}"
        restic_target_password_file_path: "{{ host_restic.passwords_dir }}/{{ item.name }}.password"
        restic_ssh_dir: "{{ host_restic.ssh_dir }}"

    - name: Render restic job config files
      ansible.builtin.template:
        src: restic-job.sh.j2
        dest: "{{ host_restic.jobs_dir }}/{{ item.name }}.sh"
        owner: root
        group: root
        mode: '0600'
      loop: "{{ restic_effective_jobs }}"
      loop_control:
        label: "{{ item.name }}"
      vars:
        restic_job: "{{ item }}"

    - name: Render generic restic backup runner
      ansible.builtin.template:
        src: restic-backup.sh.j2
        dest: "{{ host_restic.backup_script_path }}"
        owner: root
        group: root
        mode: '0750'
      vars:
        restic_targets_dir: "{{ host_restic.targets_dir }}"
        restic_jobs_dir: "{{ host_restic.jobs_dir }}"

    - name: Render generic restic maintenance runner
      ansible.builtin.template:
        src: restic-maintain.sh.j2
        dest: "{{ host_restic.maintain_script_path }}"
        owner: root
        group: root
        mode: '0750'
      vars:
        restic_targets_dir: "{{ host_restic.targets_dir }}"
        restic_jobs_dir: "{{ host_restic.jobs_dir }}"

    - name: Find existing managed systemd unit files
      ansible.builtin.find:
        paths: /etc/systemd/system
        patterns:
          - "crownops-restic-backup-*.service"
          - "crownops-restic-backup-*.timer"
          - "crownops-restic-maintain-*.service"
          - "crownops-restic-maintain-*.timer"
        file_type: file
      register: restic_existing_unit_files

    - name: Disable stale managed timer units
      ansible.builtin.systemd:
        name: "{{ item.path | basename }}"
        enabled: false
        state: stopped
      loop: "{{ restic_existing_unit_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when:
        - item.path.endswith('.timer')
        - item.path not in restic_desired_unit_paths
      failed_when: false

    - name: Remove stale managed unit files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ restic_existing_unit_files.files | default([]) }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when: item.path not in restic_desired_unit_paths

    - name: Render per-job backup systemd services
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ item.backup_service_unit }}"
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=CrownOps restic backup job {{ item.job_name }} to {{ item.target_name }}
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart={{ host_restic.backup_script_path }} {{ item.target_name }} {{ item.job_name }}
          Nice=10
          IOSchedulingClass=best-effort
          IOSchedulingPriority=7
          NoNewPrivileges=yes
          PrivateTmp=yes
          TimeoutStartSec=12h
      loop: "{{ restic_effective_pairs }}"
      loop_control:
        label: "{{ item.backup_service_unit }}"

    - name: Render per-job backup systemd timers
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ item.backup_timer_unit }}"
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=CrownOps restic backup timer {{ item.job_name }} to {{ item.target_name }}

          [Timer]
          OnCalendar={{ restic_effective_jobs | selectattr('name', 'equalto', item.job_name) | map(attribute='backup_schedule') | first }}
          Persistent=true
          RandomizedDelaySec={{ restic_effective_jobs | selectattr('name', 'equalto', item.job_name) | map(attribute='backup_randomized_delay') | first }}
          Unit={{ item.backup_service_unit }}

          [Install]
          WantedBy=timers.target
      loop: "{{ restic_effective_pairs }}"
      loop_control:
        label: "{{ item.backup_timer_unit }}"

    - name: Render per-job maintenance systemd services
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ item.maintenance_service_unit }}"
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=CrownOps restic maintenance job {{ item.job_name }} on {{ item.target_name }}
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart={{ host_restic.maintain_script_path }} {{ item.target_name }} {{ item.job_name }}
          Nice=10
          IOSchedulingClass=best-effort
          IOSchedulingPriority=7
          NoNewPrivileges=yes
          PrivateTmp=yes
          TimeoutStartSec=12h
      loop: "{{ restic_effective_pairs }}"
      loop_control:
        label: "{{ item.maintenance_service_unit }}"

    - name: Render per-job maintenance systemd timers
      ansible.builtin.copy:
        dest: "/etc/systemd/system/{{ item.maintenance_timer_unit }}"
        owner: root
        group: root
        mode: '0644'
        content: |
          [Unit]
          Description=CrownOps restic maintenance timer {{ item.job_name }} on {{ item.target_name }}

          [Timer]
          OnCalendar={{ restic_effective_jobs | selectattr('name', 'equalto', item.job_name) | map(attribute='maintenance_schedule') | first }}
          Persistent=true
          RandomizedDelaySec={{ restic_effective_jobs | selectattr('name', 'equalto', item.job_name) | map(attribute='maintenance_randomized_delay') | first }}
          Unit={{ item.maintenance_service_unit }}

          [Install]
          WantedBy=timers.target
      loop: "{{ restic_effective_pairs }}"
      loop_control:
        label: "{{ item.maintenance_timer_unit }}"

    - name: Reload systemd after unit updates
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start backup timers
      ansible.builtin.systemd:
        name: "{{ item.backup_timer_unit }}"
        enabled: true
        state: started
      loop: "{{ restic_effective_pairs }}"
      loop_control:
        label: "{{ item.backup_timer_unit }}"

    - name: Enable and start maintenance timers
      ansible.builtin.systemd:
        name: "{{ item.maintenance_timer_unit }}"
        enabled: true
        state: started
      loop: "{{ restic_effective_pairs }}"
      loop_control:
        label: "{{ item.maintenance_timer_unit }}"
