---
- name: Reject unsupported feature-owned restic jobs
  ansible.builtin.assert:
    that:
      - (host_restic.feature_owned_jobs | default([]) | length) == 0
    fail_msg: >-
      host_restic.feature_owned_jobs is intentionally unsupported in this refactor.
      Compose datasets into host_restic.jobs instead of delegating schedule ownership to features.

- name: Assert backup targets exist
  ansible.builtin.assert:
    that:
      - (restic_effective_targets | length) > 0
    fail_msg: "Define at least one enabled host_restic target."

- name: Assert backup datasets exist
  ansible.builtin.assert:
    that:
      - (restic_effective_datasets | length) > 0
    fail_msg: "Define at least one enabled host_restic dataset."

- name: Assert backup jobs exist
  ansible.builtin.assert:
    that:
      - (restic_effective_jobs | length) > 0
    fail_msg: "Define at least one enabled host_restic job."

- name: Assert target names are unique
  ansible.builtin.assert:
    that:
      - (restic_effective_target_names | unique | length) == (restic_effective_target_names | length)
    fail_msg: "host_restic target names must be unique."

- name: Assert dataset names are unique
  ansible.builtin.assert:
    that:
      - (restic_effective_dataset_names | unique | length) == (restic_effective_dataset_names | length)
    fail_msg: "host_restic dataset names must be unique."

- name: Assert job names are unique
  ansible.builtin.assert:
    that:
      - ((restic_effective_jobs | map(attribute='name') | list | unique | length) == (restic_effective_jobs | length))
    fail_msg: "host_restic job names must be unique."

- name: Validate individual backup targets
  ansible.builtin.assert:
    that:
      - (item.name | length) > 0
      - item.name is match('^[a-z0-9][a-z0-9_-]*$')
      - (item.repository | length) > 0
      - (item.password | length) > 0
      - item.environment is mapping
      - (item.ssh_private_key | length) == 0 or (item.sftp_command | length) > 0 or (item.ssh_known_hosts | length) > 0
      - (item.ssh_private_key | length) == 0 or (item.sftp_command | length) > 0 or (item.repository is match('^sftp:[^:]+:.+$'))
    fail_msg: "Invalid host_restic target '{{ item.name | default('unnamed') }}'."
  loop: "{{ restic_effective_targets }}"
  loop_control:
    label: "{{ item.name }}"

- name: Validate individual backup datasets
  ansible.builtin.assert:
    that:
      - (item.name | length) > 0
      - item.name is match('^[a-z0-9][a-z0-9_-]*$')
      - (item.owner | length) > 0
      - (item.paths | length) > 0
    fail_msg: "Invalid host_restic dataset '{{ item.name | default('unnamed') }}'."
  loop: "{{ restic_effective_datasets }}"
  loop_control:
    label: "{{ item.name }}"

- name: Validate individual backup jobs
  ansible.builtin.assert:
    that:
      - (item.name | length) > 0
      - item.name is match('^[a-z0-9][a-z0-9_-]*$')
      - (item.dataset_names | length) > 0
      - (item.dataset_names | difference(restic_effective_dataset_names) | length) == 0
      - (item.paths | length) > 0
      - (item.target_names | length) > 0
      - (item.target_names | difference(restic_effective_target_names) | length) == 0
      - (item.backup_schedule | length) > 0
      - (item.maintenance_schedule | length) > 0
    fail_msg: "Invalid host_restic job '{{ item.name | default('unnamed') }}'."
  loop: "{{ restic_effective_jobs }}"
  loop_control:
    label: "{{ item.name }}"
