---
- name: Create handoff directory
  ansible.builtin.file:
    path: "{{ obsidian_livesync.handoff_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Render synced vault handoff summary
  ansible.builtin.copy:
    dest: "{{ obsidian_livesync.handoff_dir }}/USER_VAULT_HANDOFF.md"
    owner: root
    group: root
    mode: '0600'
    content: |
      # User Vault Handoff

      Access mode: {{ obsidian_livesync.access_mode }}
      Base URL: {{ obsidian_livesync.base_url }}

      {% for v in obsidian_livesync.couchdb.vaults %}
      ## {{ v.name }}
      - DB name: {{ v.db_name }}
      - CouchDB username: {{ v.user }}
      - Password: {{ v.password }}
      - Final LiveSync encryption passphrase: user-owned and not stored here by design.

      {% endfor %}
  no_log: true
