---
- name: Create CouchDB directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ couchdb_dir }}"
    - "{{ couchdb_dir }}/data"
    - "{{ couchdb_dir }}/etc"
    - "{{ couchdb_dir }}/bootstrap"

- name: Render CouchDB local.ini
  ansible.builtin.template:
    src: local.ini.j2
    dest: "{{ couchdb_dir }}/etc/local.ini"
    owner: root
    group: root
    mode: '0640'
  no_log: true

- name: Render CouchDB docker compose
  ansible.builtin.template:
    src: couchdb-docker-compose.yml.j2
    dest: "{{ couchdb_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'

- name: Render CouchDB bootstrap helper
  ansible.builtin.template:
    src: bootstrap-couchdb.sh.j2
    dest: "{{ couchdb_dir }}/bootstrap/bootstrap-couchdb.sh"
    owner: root
    group: root
    mode: '0750'
  no_log: true

- name: Deploy CouchDB stack
  community.docker.docker_compose_v2:
    project_src: "{{ couchdb_dir }}"
    state: present
