---
- name: Create CouchDB directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ couchdb_dir }}"
    - "{{ couchdb_dir }}/data"
    - "{{ couchdb_dir }}/etc"

- name: Render CouchDB local.ini
  ansible.builtin.template:
    src: local.ini.j2
    dest: "{{ couchdb_dir }}/etc/local.ini"
    owner: "5984"
    group: "5984"
    mode: '0644'
  no_log: true

- name: Render CouchDB docker compose
  ansible.builtin.template:
    src: couchdb-docker-compose.yml.j2
    dest: "{{ couchdb_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'

- name: Deploy CouchDB stack
  community.docker.docker_compose_v2:
    project_src: "{{ couchdb_dir }}"
    state: present

- name: Wait for local CouchDB admin endpoint
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/_up"
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: obsidian_couchdb_up
  retries: 30
  delay: 2
  until: obsidian_couchdb_up.status == 200
  no_log: true

- name: Read CouchDB cluster setup state
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/_cluster_setup"
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: obsidian_couchdb_cluster_setup
  no_log: true

- name: Enable CouchDB single-node setup
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/_cluster_setup"
    method: POST
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      action: enable_single_node
      bind_address: "{{ couchdb_bind_host }}"
      port: "{{ couchdb_port | string }}"
      node_count: "1"
      username: "{{ couchdb_admin_user }}"
      password: "{{ couchdb_admin_password }}"
    status_code:
      - 200
      - 201
      - 202
  when: (obsidian_couchdb_cluster_setup.json.state | default('')) not in ['single_node_enabled', 'cluster_finished']
  no_log: true

- name: Wait for CouchDB single-node setup to finish
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/_cluster_setup"
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: obsidian_couchdb_cluster_setup_wait
  retries: 15
  delay: 2
  until: (obsidian_couchdb_cluster_setup_wait.json.state | default('')) in ['single_node_enabled', 'cluster_finished']
  no_log: true

- name: Wait for CouchDB system databases
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/{{ item }}"
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code: 200
  loop:
    - _users
    - _replicator
    - _global_changes
  register: obsidian_couchdb_system_dbs
  retries: 15
  delay: 2
  until: obsidian_couchdb_system_dbs.status == 200
  no_log: true

- name: Read existing CouchDB user documents
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/_users/org.couchdb.user:{{ item.user }}"
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code:
      - 200
      - 404
  loop: "{{ couchdb_vaults }}"
  register: obsidian_couchdb_user_docs
  no_log: true

- name: Ensure CouchDB users exist with expected passwords
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/_users/org.couchdb.user:{{ item.item.user }}"
    method: PUT
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      _id: "org.couchdb.user:{{ item.item.user }}"
      _rev: "{{ item.json._rev if item.status == 200 else omit }}"
      name: "{{ item.item.user }}"
      password: "{{ item.item.password }}"
      roles: []
      type: user
    status_code:
      - 201
      - 202
  loop: "{{ obsidian_couchdb_user_docs.results }}"
  no_log: true

- name: Ensure CouchDB databases exist
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/{{ item.db_name }}"
    method: PUT
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    status_code:
      - 201
      - 412
  loop: "{{ couchdb_vaults }}"
  no_log: true

- name: Apply CouchDB security objects
  ansible.builtin.uri:
    url: "http://{{ couchdb_bind_host }}:{{ couchdb_port }}/{{ item.db_name }}/_security"
    method: PUT
    user: "{{ couchdb_admin_user }}"
    password: "{{ couchdb_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      admins:
        names:
          - "{{ item.user }}"
        roles: []
      members:
        names:
          - "{{ item.user }}"
        roles: []
    status_code:
      - 200
      - 201
  loop: "{{ couchdb_vaults }}"
  no_log: true
