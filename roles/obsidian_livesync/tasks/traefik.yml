---
- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - "{{ traefik_dir }}"
    - "{{ traefik_dir }}/dynamic"
    - "{{ traefik_dir }}/acme"

- name: Create ACME storage file
  ansible.builtin.file:
    path: "{{ traefik_acme_storage }}"
    state: touch
    owner: root
    group: root
    mode: '0600'

- name: Render Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_dir }}/traefik.yml"
    owner: root
    group: root
    mode: '0644'

- name: Render Traefik docker compose
  ansible.builtin.template:
    src: traefik-docker-compose.yml.j2
    dest: "{{ traefik_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: '0644'
  no_log: true

- name: Deploy Traefik stack
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_dir }}"
    state: present
