---
obsidian_livesync:
  access_mode: public_https
  base_url: ""
  handoff_dir: /root/crownops-handoff
  ingress:
    shared_network_name: ""
  couchdb:
    dir: /opt/couchdb
    container_name: couchdb
    internal_network_name: internal
    bind_host: 127.0.0.1
    port: 5984
    admin_user: admin
    admin_password: ""
    vaults: []
    cors_origins: []
    cors_headers:
      - accept
      - authorization
      - content-type
      - origin
      - referer
      - x-requested-with
    cors_methods:
      - GET
      - PUT
      - POST
      - HEAD
      - DELETE
      - OPTIONS
    cors_max_age: 3600
